<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://googleapis.com" rel="stylesheet">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
    
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="logo-area">
                <img src="../imagens/img_login.png" alt="imagem login">
                <h1>StonksFinance</h1>
                <p>Bem-vindo de volta</p>
            </div>

            <div class="erro" id="erro-login"></div>

            <form id="form-login">
                <div class="input-group">
                    <input type="email" id="email" placeholder="E-mail" required>
                    <div class="senha-box">
                        <input type="password" placeholder="Insira sua senha" id="senha" required>
                        <i class="fa-solid fa-eye" onclick="toggleSenha('senha', this)"></i>
                    </div>
                </div>

                <button id="btn-entrar" type="submit" style="width: 100%;">ENTRAR</button>
            </form>

            <div class="footer-link">
                Não tem uma conta? <a href="cadastro.html">Faça seu cadastro</a>
            </div>
        </div>
    </div>

    
    <div id="modal-sucesso" class="modal-overlay">
        <div class="modal-content" style="text-align: center;">
            <!-- Ícone SVG de Confirmação -->
            <svg xmlns="http://w3.org" viewBox="0 0 512 512" width="80" height="80" style="margin-bottom: 20px;">
                <circle cx="256" cy="256" r="220" fill="none" stroke="#4CD964" stroke-width="32"/>
                <path d="M150 260 l70 70 l140 -140" fill="none" stroke="#4CD964" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            
            <h2>Login realizado com sucesso!</h2>
            <p>Redirecionando para suas transações...</p>
        </div>
    </div>


    <script src="../js/login.js"></script>
</body>
</html>
